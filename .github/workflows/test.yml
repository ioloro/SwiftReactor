name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift build + xcodebuild test
    # macos-15 ships with Xcode 16+ which is required for the
    # `swift-tools-version: 6.0` in Package.swift. macos-14's default
    # Xcode is still 15.x.
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Don't hard-code a path like `/Applications/Xcode_16.app` — the
      # runner image's actual installs are versioned (e.g.
      # `Xcode_16.0.app`, `Xcode_16.1.app`) and they rotate. The action
      # picks whatever stable Xcode 16 the image has today.
      - name: Select Xcode (latest stable 16)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show selected Xcode + Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: swift build
        run: swift build

      # `swift test` can't dlopen WebRTC.framework from the SwiftPM test
      # bundle. The xcodebuild auto-generated SwiftReactor-Package
      # scheme loads the framework correctly and exposes the test
      # bundle (the bare SwiftReactor scheme is library-only).
      - name: xcodebuild test
        run: |
          xcodebuild test \
            -scheme SwiftReactor-Package \
            -destination 'platform=macOS,arch=arm64' \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
